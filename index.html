<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Командный список задач</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Список задач команды</h1>

        <div class="add-task-form">
            <input type="text" id="taskInput" placeholder="Введите новую задачу...">
            <input type="text" id="assigneeInput" placeholder="Кто выполняет?">
            <button type="button" id="addButton">Добавить</button>
        </div>

        <div class="filters">
            <button type="button" class="filter-btn active" data-filter="all">Все</button>
            <button type="button" class="filter-btn" data-filter="active">Активные</button>
            <button type="button" class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <ul id="taskList"></ul>

        <div class="task-counter">
            <span id="taskCount">Задач: 0</span>
        </div>
    </div>

    <div id="deleteConfirmModal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle">
        <div class="modal-box">
            <p id="deleteConfirmTitle" class="modal-text">Вы уверены, что хотите удалить эту задачу?</p>
            <div class="modal-actions">
                <button type="button" class="modal-btn modal-btn-cancel" id="deleteConfirmCancel">Отмена</button>
                <button type="button" class="modal-btn modal-btn-danger" id="deleteConfirmOk">Удалить</button>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
